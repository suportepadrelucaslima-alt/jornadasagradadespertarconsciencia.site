<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Desatadora de Nós</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background: radial-gradient(ellipse at center, #7a6736 0%, #574725 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px 16px 48px;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: 420px;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      background: #fff;
      position: relative;
    }

    /* ── Imagem hero ── */
    .hero {
      width: 70%;
      max-width: 260px;
      height: auto;
      display: block;
      margin: 24px auto 8px;
      border-radius: 12px;
    }

    /* placeholder quando não há imagem */
    .hero-placeholder {
      width: 100%;
      height: 220px;
      background: linear-gradient(160deg, #d1a62f 0%, #b49443 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-placeholder span {
      font-size: 90px;
      opacity: 0.6;
    }

    /* ── Badge ── */
    .badge {
      background: linear-gradient(90deg, #d1a149, #c59b41, #be903b);
      color: #f5d98a;
      font-family: 'Poppins', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 20px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .badge-icon {
      font-size: 16px;
    }

    /* ── Conteúdo ── */
    .content {
      background: #fffef7;
      padding: 28px 24px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* ── Headline ── */
    .headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(24px, 6vw, 30px);
      font-weight: 900;
      color: #1a1008;
      text-align: center;
      line-height: 1.25;
    }

    .headline em {
      font-style: italic;
      color: #8b6000;
    }

    /* ── Subheadline ── */
    .subheadline {
      font-size: 13px;
      font-weight: 700;
      color: #8b6000;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      text-align: center;
    }

    /* ── Botão ── */
    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 17px 20px;
      background: linear-gradient(135deg, #be9221, #8d7520, #eec05e);
      color: #1a1008;
      font-family: 'Poppins', sans-serif;
      font-size: 18px;
      font-weight: 800;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 5px 18px rgba(180,120,0,0.5);
      transition: transform 0.15s, box-shadow 0.15s;
      animation: glow 2.4s ease-in-out infinite;
    }

    .cta-btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(180,120,0,0.7); }
    .cta-btn:active { transform: translateY(0); }

    @keyframes glow {
      0%, 100% { box-shadow: 0 5px 18px rgba(180,120,0,0.45); }
      50%       { box-shadow: 0 5px 30px rgba(180,120,0,0.80); }
    }

    /* ── Envio instantâneo ── */
    .instant {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #777;
    }

    /* ── Footer ── */
    footer {
      margin-top: 28px;
      text-align: center;
      color: rgba(255,255,255,0.65);
      font-size: 11px;
      line-height: 2;
    }

    footer a {
      color: rgba(255,255,255,0.8);
      text-decoration: underline;
    }
  </style>

  <script>
  window.googlePixelId = "6a052935a823e9c41c568ab7";
  var a = document.createElement("script");
  a.setAttribute("async", "");
  a.setAttribute("defer", "");
  a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel-google.js");
  document.head.appendChild(a);
</script>
<script
  src="https://cdn.utmify.com.br/scripts/utms/latest.js"
  data-utmify-prevent-xcod-sck
  data-utmify-prevent-subids
  async
  defer
></script>
</head>
<body>

  <div class="card">

    <!-- Imagem hero -->
    <!--
      Coloque a imagem da Desatadora de Nós na pasta e ajuste o src abaixo.
      Sugestão de nome: desatadora.jpg
    -->
    <img
      class="hero"
      src="desatadora.jpg"
      alt="Desatadora de Nós"
      onerror="this.outerHTML='<div class=\'hero-placeholder\'><span>🙏</span></div>'"
    />

    <!-- Badge -->
    <div class="badge">
      <span class="badge-icon">✨</span>
      DESATADORA DE NÓS
      <span class="badge-icon">✨</span>
    </div>

    <!-- Conteúdo -->
    <div class="content">

      <h1 class="headline">
        Escute essa <em>oração<br />de 7 palavras</em>
      </h1>

      <p class="subheadline">Clique abaixo e Ouça agora</p>

      <a href="https://jornadasagradadespertarconsciencia.site/pra_1" class="cta-btn" id="cta-btn">
        <!-- ícone play -->
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="currentColor" viewBox="0 0 16 16">
          <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
          <path d="M6.271 5.055a.5.5 0 0 1 .52.038l3.5 2.5a.5.5 0 0 1 0 .814l-3.5 2.5A.5.5 0 0 1 6 10.5v-5a.5.5 0 0 1 .271-.445z"/>
        </svg>
        Ouvir Agora
      </a>

      <div class="instant">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="#8b6000" viewBox="0 0 16 16">
          <path d="M8 1a2 2 0 0 1 2 2v4H6V3a2 2 0 0 1 2-2zm3 6V3a3 3 0 0 0-6 0v4a2 2 0 0 0-2 2v5a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
        </svg>
        Acesso imediato e gratuito
      </div>

    </div>
  </div>

  <!-- Rodapé fora do card -->
  <footer>
    &copy; 2026 Desatadora de Nós. Todos os direitos reservados.<br />
    <a href="termos.html">Termos de Uso</a> &nbsp;·&nbsp; <a href="privacidade.html">Política de Privacidade</a>
  </footer>

  <script>
    (function () {
      var params = window.location.search; // ex: ?tftk=55bdd5cf-d&utm_campaign=123...
      if (!params) return;
      var btn = document.getElementById('cta-btn');
      var base = btn.href;
      // se o destino já tiver "?" concatena com &, senão com ?
      btn.href = base + (base.indexOf('?') !== -1 ? '&' : '?') + params.slice(1);
    })();
  </script>
</body>
</html>
